<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SOC Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
        }
        .login-logo {
            font-size: 3rem;
            color: #58a6ff;
        }
        .login-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e6edf3;
        }
        .login-subtitle {
            font-size: 0.85rem;
            color: #8b949e;
        }
        .form-control {
            background-color: #21262d;
            border-color: #30363d;
            color: #c9d1d9;
            padding-left: 2.5rem;
        }
        .form-control:focus {
            background-color: #21262d;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 0.2rem rgba(88, 166, 255, 0.25);
        }
        .form-control::placeholder {
            color: #6e7681;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 0.9rem;
            z-index: 5;
        }
        .btn-login {
            background-color: #238636;
            border-color: #238636;
            color: #fff;
            font-weight: 600;
            padding: 0.6rem;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #2ea043;
            border-color: #2ea043;
            color: #fff;
        }
        .error-box {
            background-color: #3d1717;
            border: 1px solid #da3633;
            border-radius: 6px;
            color: #ff7b72;
            font-size: 0.85rem;
            padding: 0.65rem 0.9rem;
        }
        label {
            color: #8b949e;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .contact-hint {
            font-size: 0.78rem;
            color: #6e7681;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-logo mb-2"><i class="bi bi-shield-lock-fill"></i></div>
            <div class="login-title">SOC Dashboard</div>
            <div class="login-subtitle">Security Operations Center</div>
        </div>

        {% if form.errors %}
        <div class="error-box mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>
            ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" id="id_username"
                           class="form-control" placeholder="Enter username"
                           autocomplete="username" autofocus required>
                </div>
            </div>
            <div class="mb-4">
                <label for="id_password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="id_password"
                           class="form-control" placeholder="Enter password"
                           autocomplete="current-password" required>
                </div>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-login mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>
        </form>

        <p class="contact-hint">
            <i class="bi bi-info-circle me-1"></i>ติดต่อผู้ดูแลระบบเพื่อขอสิทธิ์เข้าใช้งาน
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
